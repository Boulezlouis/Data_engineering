services:
  postgres:
    image: postgres:15
    container_name: rmi_postgres_p2
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=weather_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_p2:/var/lib/postgresql/data

  loader:
    build: .
    container_name: rmi_loader_p2
    depends_on:
      - postgres
    tty: true
    stdin_open: true
    volumes:
      - .:/app
    environment:
      - DB_URL=postgresql://admin:password@postgres:5432/weather_db

  pgadmin:
    image: dpage/pgadmin4
    container_name: rmi_pgadmin_p2
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=password
    ports:
      - "8080:80"
    depends_on:
      - postgres
  
  airflow:
    image: apache/airflow:2.7.1-python3.9
    container_name: rmi_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8085:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/app
    command: standalone

volumes:
  postgres_data_p2: